<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Recipes</title>
  <meta name="theme-color" content="#c4502a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Recipes">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header id="app-header">
    <button id="back-btn" class="icon-btn invisible" aria-label="Back">
      <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <h1 id="app-title">Recipes</h1>
    <button id="cook-btn" class="icon-btn invisible" aria-label="Cook mode">
      <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M6 2v6m0-6h12v6M4 8h16l-1 13H5L4 8z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </header>

  <main id="app-main">
    <section id="list-view">
      <div class="search-bar">
        <input id="search" type="search" placeholder="Search recipes" autocomplete="off" autocorrect="off" autocapitalize="off">
      </div>
      <div id="tag-filter" class="tag-row" role="tablist"></div>
      <div id="recipe-grid" class="grid" aria-live="polite"></div>
      <p id="empty-state" hidden>No recipes match.</p>
    </section>

    <article id="detail-view" hidden></article>
  </main>

  <script src="app.js" type="module"></script>
</body>
</html>
